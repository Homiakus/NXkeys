name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - run: go test ./...
      - run: go vet ./...
      - run: go build -o dist/nxkeys.exe ./cmd/nxkeys
