name: ci

on:
  push:
  pull_request:

jobs:
  build-and-validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify C#-only source tree
        shell: pwsh
        run: |
          $goFiles = @(Get-ChildItem -Recurse -File -Filter *.go)
          if ($goFiles.Count -gt 0) {
            $goFiles | ForEach-Object { Write-Error "Unexpected Go source: $($_.FullName)" }
            exit 1
          }
          if (Test-Path go.mod) { throw 'go.mod must not exist in the C#-only repository.' }

      - name: Validate JSON profiles
        shell: pwsh
        run: |
          Get-ChildItem .\config -File -Filter *.json | ForEach-Object {
            Write-Host "Validating $($_.FullName)"
            Get-Content $_.FullName -Raw -Encoding UTF8 | ConvertFrom-Json | Out-Null
          }

      - name: Validate adaptive profile and documentation
        shell: pwsh
        run: |
          node .\scripts\validate-command-tree.mjs *> adaptive-validation.log
          $code = $LASTEXITCODE
          Get-Content adaptive-validation.log -Tail 200
          exit $code

      - name: Run DFA and HFSM invariants
        shell: pwsh
        run: |
          dotnet run --project .\NXKeys.StateMachines.Tests\NXKeys.StateMachines.Tests.csproj -c Release --nologo *> state-machine-tests.log
          $code = $LASTEXITCODE
          Get-Content state-machine-tests.log -Tail 180
          exit $code

      - name: Build Hotkey Studio
        shell: pwsh
        run: |
          dotnet build .\NX2512_HotkeyStudio\NX2512_HotkeyStudio.csproj -c Release -p:Platform=x64 --nologo -v:q *> hotkey-build.log
          $code = $LASTEXITCODE
          Get-Content hotkey-build.log -Tail 180
          exit $code

      - name: Publish Hotkey Studio
        shell: pwsh
        run: |
          dotnet publish .\NX2512_HotkeyStudio\NX2512_HotkeyStudio.csproj -c Release -r win-x64 --self-contained false -p:Platform=x64 -o .\artifacts\hotkey-studio --nologo -v:q *> hotkey-publish.log
          $code = $LASTEXITCODE
          Get-Content hotkey-publish.log -Tail 160
          if ($code -ne 0) { exit $code }
          if (-not (Test-Path .\artifacts\hotkey-studio\nx2512-state-machines.json)) {
            throw 'Declarative state-machine profile was not included in publish output.'
          }

      - name: Validate canonical profile through C# CLI
        shell: pwsh
        run: |
          Copy-Item .\config\nx2512-pro-hybrid.json .\artifacts\hotkey-studio\nx2512-pro-hybrid.json -Force
          & .\artifacts\hotkey-studio\NX2512_HotkeyStudio.exe validate --config .\artifacts\hotkey-studio\nx2512-pro-hybrid.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Adaptive Control Center
        shell: pwsh
        run: |
          dotnet build .\NX2512_ControlCenter\NX2512_ControlCenter.csproj -c Release -p:Platform=x64 --nologo -v:q *> control-build.log
          $code = $LASTEXITCODE
          Get-Content control-build.log -Tail 140
          exit $code

      - name: Publish Adaptive Control Center
        shell: pwsh
        run: |
          dotnet publish .\NX2512_ControlCenter\NX2512_ControlCenter.csproj -c Release -r win-x64 --self-contained false -p:Platform=x64 -o .\artifacts\control-center --nologo -v:q *> control-publish.log
          $code = $LASTEXITCODE
          Get-Content control-publish.log -Tail 140
          exit $code

      - name: Build NXOpen contract stubs
        shell: pwsh
        run: |
          dotnet build .\NX2512_CommandBridge.Tests\NXOpenUI\NXOpenUI.csproj -c Release -o .\artifacts\nxopen-contract --nologo -v:q *> nxopen-stubs-build.log
          $code = $LASTEXITCODE
          Get-Content nxopen-stubs-build.log -Tail 140
          if ($code -ne 0) { exit $code }
          if (-not (Test-Path .\artifacts\nxopen-contract\NXOpen.dll)) { throw 'NXOpen contract assembly was not produced.' }
          if (-not (Test-Path .\artifacts\nxopen-contract\NXOpenUI.dll)) { throw 'NXOpenUI contract assembly was not produced.' }

      - name: Compile Command Bridge against NXOpen contract
        shell: pwsh
        run: |
          $nxOpenDir = (Resolve-Path .\artifacts\nxopen-contract).Path
          dotnet build .\NX2512_CommandBridge\NX2512_CommandBridge.csproj -c Release -p:Platform=x64 -p:NXOpenDir="$nxOpenDir" --nologo -v:q *> bridge-contract-build.log
          $code = $LASTEXITCODE
          Get-Content bridge-contract-build.log -Tail 180
          exit $code

      - name: Validate adaptive state and protocol invariants
        shell: pwsh
        run: |
          $models = Get-Content .\NX2512_HotkeyStudio\Models\ConfigModels.cs -Raw
          $resolver = Get-Content .\NX2512_HotkeyStudio\Services\AdaptiveModuleResolver.cs -Raw
          $leader = Get-Content .\NX2512_HotkeyStudio\Services\LeaderKeyEngine.cs -Raw
          $machine = Get-Content .\NXKeys.StateMachines\LeaderStateMachines.cs -Raw
          $protocol = Get-Content .\NXKeys.Protocol\NxProtocol.cs -Raw
          $bridge = Get-Content .\NX2512_CommandBridge\Program.cs -Raw
          $profile = Get-Content .\config\nx2512-pro-hybrid.json -Raw

          foreach ($required in @('BasicShortcutPolicy','AdaptiveModuleMode','SlotKeyMap','RebuildFromModules','JsonIgnore')) {
            if ($models -notmatch $required) { throw "Missing adaptive config element: $required" }
          }
          foreach ($required in @('ModuleId','ModuleLabel','ApplicationId','NXApplicationIDs','ApplicationFallbacks')) {
            if ($resolver -notmatch $required) { throw "Missing module resolution element: $required" }
          }
          foreach ($required in @('ActivateScoped','AdaptiveModuleResolver','InputToken(activeModule.LeaderPrefix)','activeModule','Search')) {
            if ($leader -notmatch [regex]::Escape($required)) { throw "Missing adaptive Leader element: $required" }
          }
          foreach ($required in @('AwaitingConfirmation','AwaitingResult','SwitchingModule','SequenceAutomaton','ContextGuardEvaluator','TypesAny','MinimumContextConfidence')) {
            if ($machine -notmatch $required) { throw "Missing state-machine element: $required" }
          }
          foreach ($required in @('expected_context_revision','expected_selection_count','expires_utc','confirmation_accepted')) {
            if ($protocol -notmatch $required) { throw "Shared protocol field is missing: $required" }
          }
          foreach ($required in @('ProcessingDirectory','RecoverInterruptedRequests','ValidateExpectedContext','interrupted_unknown')) {
            if ($bridge -notmatch $required) { throw "Bridge reliability element is missing: $required" }
          }
          if ($profile -notmatch '"schema_version"\s*:\s*4') { throw 'Canonical profile must use schema version 4.' }
          if ($profile -match '"radials"') { throw 'Removed menu collection must not return to the canonical profile.' }

      - name: Validate deployment invariants
        shell: pwsh
        run: |
          $engine = Get-Content .\NX2512_HotkeyStudio\Services\DeploymentEngine.cs -Raw
          if ($engine -match 'DeployToSiemensUserProfiles') { throw 'Broad Siemens profile deployment must not return.' }
          if ($engine -match 'Path\.Combine\(startup,\s*"NX2512_CommandBridge\.dll"') { throw 'CommandBridge DLL must not be installed into custom/startup.' }
          if ($engine -match 'set "PATH=' -or $engine -match 'UGII_USER_DIR') { throw 'NX launcher must not override PATH or UGII_USER_DIR.' }
          if ($engine -match 'radial-menu-plan') { throw 'Removed deployment artifacts must not return.' }

      - name: Publish diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: csharp-build-logs
          path: |
            adaptive-validation.log
            state-machine-tests.log
            hotkey-build.log
            hotkey-publish.log
            control-build.log
            control-publish.log
            nxopen-stubs-build.log
            bridge-contract-build.log
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        with:
          name: nxkeys-csharp-win-x64
          path: |
            artifacts/hotkey-studio
            artifacts/control-center
